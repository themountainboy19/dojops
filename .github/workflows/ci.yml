name: "DojOps CI Workflow"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  PNPM_VERSION: 8.15.0

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      build-status: ${{ steps.build.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        id: build
        run: pnpm build

  lint:
    name: Lint & Format
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      lint-status: ${{ steps.lint.outcome }}
      format-status: ${{ steps.format.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        id: lint
        run: pnpm lint

      - name: Check formatting
        id: format
        run: pnpm format:check

  compatibility:
    name: Node.js Compatibility
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  test:
    name: Test & Coverage
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      test-status: ${{ steps.test.outcome }}
      coverage-status: ${{ steps.coverage.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests with coverage
        id: test
        run: pnpm test:coverage
        env:
          CI: true
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        id: coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: test-report.junit.xml
          report_type: test_results
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
            !coverage/node_modules/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      audit-status: ${{ steps.audit.outputs.passed }}
      trivy-critical: ${{ steps.trivy-summary.outputs.critical }}
      trivy-high: ${{ steps.trivy-summary.outputs.high }}
      trivy-medium: ${{ steps.trivy-summary.outputs.medium }}
      trivy-low: ${{ steps.trivy-summary.outputs.low }}
      trivy-total: ${{ steps.trivy-summary.outputs.total }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        id: audit
        run: |
          if pnpm audit --audit-level=moderate 2>&1 | tee audit-output.txt; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy vulnerability scanner
        run: trivy fs --format table --output trivy-results.txt --severity LOW,MEDIUM,HIGH,CRITICAL .

      - name: Run Trivy (JSON for summary)
        run: trivy fs --format json --output trivy-results.json --severity LOW,MEDIUM,HIGH,CRITICAL .

      - name: Build Trivy summary
        id: trivy-summary
        if: always()
        run: |
          if [ ! -s trivy-results.json ]; then
            echo "critical=0" >> "$GITHUB_OUTPUT"
            echo "high=0" >> "$GITHUB_OUTPUT"
            echo "medium=0" >> "$GITHUB_OUTPUT"
            echo "low=0" >> "$GITHUB_OUTPUT"
            echo "total=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json 2>/dev/null || echo 0)
          MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json 2>/dev/null || echo 0)
          LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy-results.json 2>/dev/null || echo 0)
          TOTAL=$((CRITICAL + HIGH + MEDIUM + LOW))

          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "medium=$MEDIUM" >> "$GITHUB_OUTPUT"
          echo "low=$LOW" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::$CRITICAL critical vulnerabilities found"
          fi
          if [ "$HIGH" -gt 0 ]; then
            echo "::warning::$HIGH high vulnerabilities found"
          fi

          # Fail the job if critical vulnerabilities are present
          if [ "$CRITICAL" -gt 0 ]; then
            exit 1
          fi

      - name: Upload security scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            trivy-results.txt
            trivy-results.json
            audit-output.txt
          retention-days: 7

  summary:
    name: Build Summary
    needs: [build, lint, test, security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate Professional Build Summary
        uses: actions/github-script@v7
        with:
          script: |
            // Status emojis and colors
            const statusEmoji = {
              success: '✅',
              failure: '❌',
              cancelled: '🚫',
              skipped: '⏭️'
            };

            const statusColor = {
              success: 'good',
              failure: 'critical',
              cancelled: 'warning',
              skipped: 'warning'
            };

            // Helper to get status display
            const getStatus = (result) => statusEmoji[result] || '⚪';

            // Job results
            const jobs = {
              'Build': '${{ needs.build.result }}',
              'Lint & Format': '${{ needs.lint.result }}',
              'Test & Coverage': '${{ needs.test.result }}',
              'Security Audit': '${{ needs.security.result }}'
            };

            // Calculate overall status
            const allSuccess = Object.values(jobs).every(r => r === 'success');
            const overallStatus = allSuccess ? '✅ PASSED' : '❌ FAILED';

            // Build summary header
            let summaryContent = `## ${overallStatus} — DojOps CI Pipeline\n\n`;
            summaryContent += `**Workflow:** \`${{ github.workflow }}\`  \n`;
            summaryContent += `**Branch:** \`${{ github.ref_name }}\`  \n`;
            const shortSha = '${{ github.sha }}'.substring(0, 7);
            summaryContent += `**Commit:** [\`${shortSha}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})  \n`;
            summaryContent += `**Triggered by:** @${{ github.actor }}  \n\n`;

            // Pipeline status table
            summaryContent += `### 📊 Pipeline Status\n\n`;
            summaryContent += `| Job | Status | Duration |\n`;
            summaryContent += `|-----|--------|----------|\n`;

            for (const [jobName, result] of Object.entries(jobs)) {
              const emoji = getStatus(result);
              summaryContent += `| ${jobName} | ${emoji} ${result.toUpperCase()} | — |\n`;
            }

            summaryContent += `\n`;

            // Security summary section
            summaryContent += `### 🔒 Security Scan Results\n\n`;

            const trivyCritical = parseInt('${{ needs.security.outputs.trivy-critical }}' || '0');
            const trivyHigh = parseInt('${{ needs.security.outputs.trivy-high }}' || '0');
            const trivyMedium = parseInt('${{ needs.security.outputs.trivy-medium }}' || '0');
            const trivyLow = parseInt('${{ needs.security.outputs.trivy-low }}' || '0');
            const trivyTotal = parseInt('${{ needs.security.outputs.trivy-total }}' || '0');
            const auditPassed = '${{ needs.security.outputs.audit-status }}' === 'true';

            summaryContent += `#### Trivy Filesystem Scan\n\n`;
            summaryContent += `| Severity | Count | Status |\n`;
            summaryContent += `|----------|-------|--------|\n`;
            summaryContent += `| 🔴 Critical | ${trivyCritical} | ${trivyCritical > 0 ? '⚠️ Action Required' : '✅ Clear'} |\n`;
            summaryContent += `| 🟠 High | ${trivyHigh} | ${trivyHigh > 0 ? '⚠️ Review Recommended' : '✅ Clear'} |\n`;
            summaryContent += `| 🟡 Medium | ${trivyMedium} | ${trivyMedium > 0 ? 'ℹ️ Monitor' : '✅ Clear'} |\n`;
            summaryContent += `| 🔵 Low | ${trivyLow} | ✅ Clear |\n`;
            summaryContent += `| **Total** | **${trivyTotal}** | — |\n\n`;

            summaryContent += `#### NPM Audit\n\n`;
            summaryContent += auditPassed 
              ? `✅ **No vulnerabilities found** — All dependencies pass security audit.\n\n`
              : `⚠️ **Vulnerabilities detected** — Review \`pnpm audit\` output for details.\n\n`;

            // Coverage summary (if available)
            summaryContent += `### 📈 Coverage Report\n\n`;
            summaryContent += `Coverage reports uploaded to [Codecov](https://codecov.io/gh/${{ github.repository }}) 📊\n\n`;

            // Quick links
            summaryContent += `### 🔗 Quick Links\n\n`;
            summaryContent += `- [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;
            summaryContent += `- [View Commit](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n`;
            summaryContent += `- [Codecov Dashboard](https://codecov.io/gh/${{ github.repository }})\n`;

            // Footer
            summaryContent += `\n---\n`;
            summaryContent += `*Generated by DojOps CI Workflow* 🚀\n`;

            // Write summary
            await core.summary.addRaw(summaryContent).write();

            // Set job output
            if (!allSuccess) {
              core.setFailed('One or more CI jobs failed');
            }

  status:
    name: CI Status Gate
    needs: [build, lint, test, security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          echo "Checking CI status..."

          BUILD="${{ needs.build.result }}"
          LINT="${{ needs.lint.result }}"
          TEST="${{ needs.test.result }}"
          SECURITY="${{ needs.security.result }}"

          FAILED=0

          if [ "$BUILD" != "success" ]; then
            echo "❌ Build job failed or was cancelled"
            FAILED=1
          fi

          if [ "$LINT" != "success" ]; then
            echo "❌ Lint & Format job failed or was cancelled"
            FAILED=1
          fi

          if [ "$TEST" != "success" ]; then
            echo "❌ Test job failed or was cancelled"
            FAILED=1
          fi

          if [ "$SECURITY" != "success" ]; then
            echo "❌ Security Audit job failed or was cancelled"
            FAILED=1
          fi

          if [ $FAILED -eq 0 ]; then
            echo "✅ All CI checks passed!"
            exit 0
          else
            echo "❌ Some CI checks failed"
            exit 1
          fi
