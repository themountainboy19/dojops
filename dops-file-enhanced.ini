# 🔒 1️⃣ Add Explicit Write Scope (Non-Negotiable)

Right now you define file paths.

But your runtime must derive an explicit allowlist scope from DSL.

Add this:

```yaml
scope:
  write:
    - "{outputPath}/Dockerfile"
    - "{outputPath}/.dockerignore"
```

Then at runtime:

* Expand variables
* Resolve to absolute paths
* Compare against global DevOps allowlist
* Enforce boundaries

Never trust `files` section alone.

---

# 🔒 2️⃣ Lock Permission Semantics

You wrote:

```yaml
permissions:
  filesystem: write
  child_process: required
  network: none
```

This is good conceptually.

But I strongly recommend:

Permissions must be declarative hints — not executable authority.

Meaning:

The runtime must decide:

* filesystem write → already allowed by policy
* child_process → allowed only via SafeExecutor
* network → must always be blocked for LLM tools

Never allow a plugin to request network and override runtime.

Permissions should influence runtime checks, not grant power.

---

# 🧬 3️⃣ Add DSL Version Locking Properly

You wrote:

```yaml
dops: v1
```

Better:

```yaml
dops:
  version: 1
  kind: tool
```

Why?

Because you’ll need:

* v1.1
* v2
* breaking changes
* optional capabilities

Flat `dops: v1` is hard to evolve cleanly.

---

# 🧠 4️⃣ Add Determinism Flag

You should explicitly define tool mutation behavior:

```yaml
execution:
  mode: generate | update
  deterministic: true
  idempotent: true
```

Why?

Because some tools:

* Generate new files
* Some update existing ones
* Some are partial patches

Runtime must know expected mutation pattern.

---

# 🔎 5️⃣ Harden Update Mode

You have:

```yaml
detection:
  updateMode: true
```

This is good — but incomplete.

Define explicitly:

```yaml
update:
  strategy: preserve_structure
  inputSource: file
  injectAs: existingContent
```

Make update behavior declarative.

Otherwise runtime logic becomes implicit and fragile.

---

# 🧪 6️⃣ Add Risk Classification (Missing)

This is critical.

Every tool must declare:

```yaml
risk:
  level: MEDIUM
  rationale: "Build image changes may affect production runtime"
```

Without risk classification,
your approval engine cannot work uniformly.

This is required for integrity.

---

# 🧱 7️⃣ Guard Against Path Traversal

Your file mapping:

```yaml
