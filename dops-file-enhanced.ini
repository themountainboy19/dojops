# DojOps Tool Definition Specification

## `.dops` — Version 1

**Status:** Stable
**Version:** 1.0
**Applies to:** DojOps Runtime v1.x

---

# 1. Overview

The `.dops` file defines a **Declarative DevOps Tool Contract**.

It describes:

* Tool identity and metadata
* Input schema
* Expected structured output
* File materialization rules
* Risk classification
* Verification mechanisms
* Execution permissions
* Update behavior

A `.dops` file is interpreted by the **DojOps Runtime** and is not executable code.

Tools defined using `.dops` are:

* Declarative
* Deterministic
* Policy-enforced
* Non-Turing complete
* Sandboxed by the Runtime

Built-in tools and user-installed tools MUST follow the same specification.

---

# 2. File Format

A `.dops` file:

* MUST be valid YAML
* MUST begin with a document separator (`---`)
* MUST contain a single tool definition
* MAY include embedded markdown prompt sections after YAML
* MUST declare `dops.version`

Example header:

```yaml
---
dops:
  version: 1
  kind: tool
---
```

---

# 3. Top-Level Structure

```yaml
dops:
  version: 1
  kind: tool

meta: {}
risk: {}
scope: {}
input: {}
output: {}
files: []
detection: {}
update: {}
verification: {}
execution: {}
permissions: {}
```

All unknown top-level keys MUST be rejected by the runtime.

---

# 4. `meta` Section

Defines tool identity.

```yaml
meta:
  name: string (required)
  version: semver (required)
  description: string (required)
  author: string (optional)
  license: string (optional)
  tags: string[] (optional)
```

Constraints:

* `name` MUST be lowercase, alphanumeric with hyphens.
* `version` MUST follow semantic versioning.
* `name + version` uniquely identify the tool.

---

# 5. `risk` Section (Required)

Defines operational risk classification.

```yaml
risk:
  level: LOW | MEDIUM | HIGH (required)
  rationale: string (required)
```

Runtime Behavior:

* `HIGH` requires explicit approval before `apply`.
* `MEDIUM` may require confirmation depending on CLI mode.
* `LOW` can execute automatically unless overridden.

Plugins CANNOT override runtime approval policy.

---

# 6. `scope` Section (Required)

Defines filesystem mutation boundaries.

```yaml
scope:
  write:
    - string (path pattern with variables)
```

Rules:

* Paths MUST be relative to project root.
* Path variables (e.g. `{outputPath}`) are resolved at runtime.
* Resolved paths MUST:

  * Not escape project root
  * Not contain `..`
  * Not resolve to symlinks outside root
* Runtime MUST intersect tool scope with global DevOps Write Allowlist.

If resolved path falls outside allowed boundaries → execution MUST fail.

---

# 7. `input` Section (Required)

Defines input schema for tool invocation.

```yaml
input:
  fields:
    fieldName:
      type: string | number | boolean | object | array
      required: true | false
      description: string
```

Rules:

* Schema is JSON-schema compatible (subset).
* Required fields MUST be validated before execution.
* Unknown input fields MAY be rejected in strict mode.

---

# 8. `output` Section (Required)

Defines structured output contract expected from the LLM.

```yaml
output:
  type: object
  required: [fieldA]
  properties:
    fieldA:
      type: string
```

Rules:

* LLM response MUST be valid JSON.
* Output MUST match declared schema.
* If schema validation fails → execution aborts.
* Runtime MUST NOT attempt auto-repair unless explicitly enabled.

---

# 9. `files` Section (Required if tool writes files)

Defines mapping from structured output → filesystem.

```yaml
files:
  - path: string
    format: raw | yaml | json
    source: llm
    dataPath: string
    conditional: true | false
```

Field Definitions:

| Field       | Description                      |
| ----------- | -------------------------------- |
| path        | Target file path with variables  |
| format      | Serialization format             |
| source      | Currently MUST be `llm`          |
| dataPath    | Path inside output JSON          |
| conditional | If true, skip if field undefined |

Rules:

* Runtime performs atomic writes (temp + rename).
* Each file MUST be validated against `scope.write`.
* Runtime MUST enforce:

  * maxFileSize
  * maxFilesPerTask
* Partial writes MUST be rolled back on failure.

---

# 10. `detection` Section (Optional)

Defines auto-detection for `init`.

```yaml
detection:
  paths: [string]
  updateMode: true | false
```

Behavior:

* If matching files exist → tool may enter update mode.
* Detection does NOT grant write permission.
* Detection MUST NOT execute arbitrary code.

---

# 11. `update` Section (Optional)

Defines update behavior semantics.

```yaml
update:
  strategy: replace | preserve_structure
  inputSource: file
  injectAs: existingContent
```

Rules:

* Runtime injects file content into prompt variable.
* Update MUST produce full file content.
* Partial patching is NOT allowed in v1.

---

# 12. `verification` Section (Optional but Recommended)

Defines post-generation validation.

```yaml
verification:
  structural:
    - path: string
      required: true
      type: string
      message: string

  binary:
    command: string
    parser: string
    timeout: number
    cwd: output | project
```

Rules:

* `binary.command` executed via SafeExecutor.
* Must respect:

  * global timeout limit
  * child process restrictions
* Non-zero exit code MAY:

  * Fail execution
  * Trigger warning (configurable)

---

# 13. `execution` Section (Optional)

Defines tool execution behavior.

```yaml
execution:
  mode: generate | update
  deterministic: true | false
  idempotent: true | false
```

Definitions:

* deterministic: same inputs + snapshot → same output
* idempotent: repeated apply produces no additional changes

Runtime may use these flags for drift detection.

---

# 14. `permissions` Section (Optional)

Declarative hints only.

```yaml
permissions:
  filesystem: write
  child_process: required | none
  network: none
```

Rules:

* Permissions do NOT grant authority.
* Runtime enforces global policy.
* `network` MUST always be `none` in v1 for LLM-based tools.

---

# 15. Prompt Sections

After YAML, markdown sections define prompt templates.

Supported sections:

* `# Prompt`
* `# Update Prompt`
* `# Examples`
* `# Constraints`
* `# Keywords`

Prompt content:

* MUST instruct model to return valid JSON
* MUST align with `output` schema
* MUST NOT override runtime constraints

Runtime injects:

* Input fields
* Existing content (if update)
* Context.md (if available)

---

# 16. Security Model

`.dops` is:

* Non-executable
* Non-Turing complete
* Declarative only

The following are explicitly forbidden:

* Embedded scripts
* Conditionals
* Loops
* Shell execution definitions outside verification
* Network calls
* Policy overrides
* Write scope escalation

---

# 17. Runtime Enforcement Guarantees

For every tool execution, runtime MUST enforce:

* Write allowlist intersection
* Atomic file writes
* Max file size limit
* Max file count limit
* Execution timeout
* Child process sandboxing
* Audit log generation
* Snapshot freezing
* Risk-based approval

Plugins cannot bypass runtime enforcement.

---

# 18. Determinism & Audit

Each execution MUST produce:

* tool name + version
* DSL version
* input hash
* system prompt hash
* model identifier
* provider identifier
* snapshot hash
* resulting file hashes

Audit entries MUST be immutable.

---

# 19. Compatibility

`.dops` v1 tools are compatible with:

* DojOps Runtime v1.x

Future DSL versions MUST increment:

```yaml
dops:
  version: 2
```

Breaking changes require new major version.

---

# 20. Design Principles

`.dops` v1 is designed to be:

* Declarative
* Strict
* Deterministic
* Safe by default
* Policy-enforced
* Extensible without breaking guarantees

---

# Final Assessment

With this specification:

Your `.dops` is no longer a config file.

It is a:

Formal DevOps Tool Contract Language.

That’s architecturally serious.


