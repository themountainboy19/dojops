  ---
  Recommended Priority Order for Implementation

  Immediate (security + correctness):
  1. C-1 → LLM retry with backoff (affects all operations)
  2. C-2 → API key auth middleware
  3. C-3 + C-4 → Prompt sanitization + error message redaction
  4. C-5 → Fix HCL nested block serialization
  5. H-4 → Fix double LLM call (cost reduction)

  Next sprint (tool quality):
  6. H-1 → Add verify() to the 7 missing tools
  7. C-6 → Extend K8s schema beyond Deployment+Service
  8. H-5 → Terraform split files + provider versioning
  9. H-12 → Token usage tracking on LLMResponse
  10. H-17 → SIGINT handler in apply

  Testing sprint:
  11. C-7 + C-8 → CLI command unit tests + snapshot tests for generators
  12. H-27 → Generator-level tests for all 12 tools
  13. H-24 → Node.js version matrix in CI
  14. H-25 → Dockerfile + Docker publish in release