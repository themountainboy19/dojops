  DojOps Full Codebase Audit — Missing Must-Have Features

  Audited across 4 dimensions: IaC tools, security/compliance, CLI/API operations, and testing/CI. Here are the deduplicated
  findings ranked by what a senior DevOps/DevSecOps engineer would flag first.

  ---
  CRITICAL (Blocks production trust)

  ┌─────┬──────────────┬─────────────────────────────────────────────────────────────────────────────────────────────────────┐
  │  #  │     Area     │                                               Finding                                               │
  ├─────┼──────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │     │ LLM          │ No retry/backoff on LLM API calls. All 5 providers make a single HTTP call and throw on any error.  │
  │ C-1 │ Reliability  │ A transient 429/502/503 aborts an entire dojops apply mid-execution. Expected: 3 retries with       │
  │     │              │ exponential backoff + jitter on rate-limit/server errors.                                           │
  ├─────┼──────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │     │              │ Zero authentication on all 19 API endpoints. Any process on the network can call /api/generate,     │
  │ C-2 │ API Security │ /api/plan?execute=true, and DELETE /api/history. No Bearer token, API key, or mTLS. The health      │
  │     │              │ endpoint is the only one that should be public.                                                     │
  ├─────┼──────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │     │              │ No prompt injection protection. User input flows directly into LLMRequest.prompt without            │
  │ C-3 │ LLM Security │ sanitization. Plugin existingContent is concatenated into system prompts — a poisoned config file   │
  │     │              │ becomes an instruction injection vector.                                                            │
  ├─────┼──────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │     │              │ API keys can leak in error messages. extractApiError() in all 5 providers returns raw SDK error     │
  │ C-4 │ LLM Security │ strings. Some SDK versions include Authorization headers in error objects. These flow to logs and   │
  │     │              │ HistoryStore (accessible via GET /api/history/:id).                                                 │
  ├─────┼──────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │     │ Terraform    │ HCL serializer breaks on nested objects. hclValue() falls through to JSON.stringify() for           │
  │ C-5 │ Tool         │ objects/arrays, producing invalid HCL for security group rules, IAM policies, lifecycle blocks —    │
  │     │              │ virtually any non-trivial resource.                                                                 │
  ├─────┼──────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ C-6 │ K8s Tool     │ Only generates Deployment + Service. No Ingress, ConfigMap, Secret, PVC, HPA, NetworkPolicy, or     │
  │     │              │ ServiceAccount. The schema is fixed to exactly 2 resource types. Any real workload requires more.   │
  ├─────┼──────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ C-7 │ Testing      │ Zero unit tests for all 25 CLI command handlers. apply.ts, plan.ts, generate.ts, etc. have no test  │
  │     │              │ files. These orchestrate the core business logic.                                                   │
  ├─────┼──────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ C-8 │ Testing      │ Zero snapshot tests for generated configs. Changes to any of the 12 serializers (HCL, YAML,         │
  │     │              │ nginx.conf, systemd unit, Makefile) have no regression guard.                                       │
  └─────┴──────────────┴─────────────────────────────────────────────────────────────────────────────────────────────────────┘

  ---
  HIGH (Senior engineers notice immediately)

  ┌──────┬────────────┬──────────────────────────────────────────────────────────────────────────────────────────────────────┐
  │  #   │    Area    │                                               Finding                                                │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │      │ Tool       │ 7 of 12 tools have no verify(). Helm (no helm lint), Ansible (no --syntax-check), Docker Compose (no │
  │ H-1  │ Safety     │  docker compose config), Nginx (no nginx -t), Prometheus (no promtool), Makefile (no make -n),       │
  │      │            │ Systemd (no systemd-analyze verify). "No blind execution" claim is undermined.                       │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-2  │ Tool       │ 6 of 12 tools have no detect(). The planner cannot programmatically determine which tools are        │
  │      │ Quality    │ relevant to the current repo.                                                                        │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-3  │ Execution  │ PlannerExecutor runs all tasks sequentially. Independent tasks at the same dependency level are      │
  │      │            │ never parallelized. A 5-task plan with 3 independent roots takes 3x longer than necessary.           │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-4  │ Execution  │ Double LLM call. SafeExecutor.executeTask() calls tool.generate(), then tool.execute() which         │
  │      │            │ internally calls generate() again. Every task makes 2 LLM API calls instead of 1.                    │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-5  │ Terraform  │ Single flat main.tf output. No variables.tf, outputs.tf, versions.tf split. No module support, no    │
  │      │            │ data sources, no provider version pinning (required_providers).                                      │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-6  │ GitHub     │ Output hardcoded to ci.yml. No input field for workflow filename. Generating a second workflow       │
  │      │ Actions    │ always overwrites the first.                                                                         │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-7  │ Helm       │ Generated charts missing probes, security context, imagePullSecrets. No livenessProbe,               │
  │      │            │ readinessProbe, runAsNonRoot, readOnlyRootFilesystem.                                                │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-8  │ Scanner    │ No SAST scanner. Only infrastructure scanning (Trivy fs, Checkov, Hadolint, ShellCheck). No Semgrep  │
  │      │            │ or equivalent for application code vulnerabilities (SQLi, XSS, path traversal).                      │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-9  │ Scanner    │ No license compliance scanning. No license-checker, pip-licenses, or trivy --scanners license.       │
  │      │            │ Enterprise teams require license audit before shipping.                                              │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-10 │ Scanner    │ No container image scanning. Trivy runs fs only, never trivy image. Base image CVEs in FROM          │
  │      │            │ ubuntu:20.04 are invisible.                                                                          │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-11 │ Executor   │ allowNetwork: false is advisory-only. Declared in policy but never enforced. Sandbox is              │
  │      │            │ path-restriction only — no process, memory, or network isolation.                                    │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-12 │ LLM        │ No token usage tracking or cost budgets. All 5 providers discard usage from API responses. No        │
  │      │            │ per-operation or per-day token limits. Cost explosions are invisible.                                │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-13 │ API        │ Sessions lost on server restart. ChatSession stored in an in-memory Map. The serializer for disk     │
  │      │            │ persistence exists in @dojops/session but the API never calls it. Same for HistoryStore.             │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-14 │ API        │ No API versioning. All routes at /api/ without /v1/ prefix. No OpenAPI/Swagger docs.                 │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-15 │ CLI        │ --output yaml advertised but never implemented. Parser accepts yaml, help text documents it, but all │
  │      │            │  commands only check === "json".                                                                     │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-16 │ CLI        │ No shell completion. No dojops completion bash/zsh/fish command.                                     │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-17 │ CLI        │ No SIGINT/SIGTERM handler in apply. Ctrl+C during task execution can leave partial files without     │
  │      │            │ backup restoration. serve and chat handle signals correctly but apply doesn't.                       │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-18 │ CLI        │ dojops serve has no startup config validation. Starts even with invalid/missing API keys. All        │
  │      │            │ requests fail at runtime with cryptic errors instead of a clear startup message.                     │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-19 │ API        │ Health check never tests LLM provider. Returns status: "ok" unconditionally. No providerReachable    │
  │      │            │ field.                                                                                               │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-20 │ Router     │ Substring keyword matching with no disambiguation. Keyword collisions between agents (e.g., "scan"   │
  │      │            │ matches both security and observability). No LLM-based fallback for ambiguous prompts.               │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-21 │ Plugin     │ Plugin hash covers only plugin.yaml — not schema files. A modified input-schema.json changes plugin  │
  │      │            │ behavior without changing pluginHash.                                                                │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-22 │ Security   │ API keys stored in plaintext JSON in ~/.dojops/config.json. No OS credential store integration       │
  │      │            │ (Keychain, libsecret).                                                                               │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-23 │ Executor   │ AutoApproveHandler is the programmatic default. API POST /api/plan with execute: true runs without   │
  │      │            │ any approval gate.                                                                                   │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-24 │ CI         │ CI runs on Node 20 only. engines: ">=18" is declared but Node 18/22 are never tested.                │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-25 │ CI         │ No Dockerfile for the tool itself. No containerized distribution. Release workflow only publishes    │
  │      │            │ npm, no Docker image.                                                                                │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-26 │ CI         │ No automated CHANGELOG. Conventional commits enforced by hook but never consumed by tooling.         │
  ├──────┼────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ H-27 │ Testing    │ 10 of 12 tool generators have no direct test. Serialization logic (HCL, YAML, nginx, systemd) is     │
  │      │            │ untested.                                                                                            │
  └──────┴────────────┴──────────────────────────────────────────────────────────────────────────────────────────────────────┘

