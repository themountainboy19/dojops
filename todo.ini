 Plan: Enhanced Scanner Detection + oda check Command

 Context

 The oda init scanner currently detects a limited set of DevOps files (4 CI platforms, basic infra/monitoring). The user wants
 comprehensive detection of all DevOps-related files (CI/CD, IaC, K8s, web servers, scripts, security configs) stored in
 context.json, plus a new oda check command that uses LLM to analyze these files for quality, security, and best practices.

