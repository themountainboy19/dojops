  ---
  BUGS FOUND (5)

  BUG-1: Double Output on Error Exit (ALL error paths)

  Severity: MEDIUM (cosmetic but unprofessional)
  Reproduce: Any command that calls process.exit() with an error — destroy, rollback, generate with no prompt, agents info with
  unknown agent
  Root Cause: process.exit() inside command handlers likely triggers @clack/prompts exit handler or the .catch() in main()
  re-renders
  Impact: Banner and error message print twice

  BUG-2: analyze diff Cannot Accept Multiline Content

  Severity: HIGH (breaks core use case)
  Reproduce: dojops analyze diff "--- a/main.tf\n+++ b/main.tf\n..." → "No diff content provided"
  Root Cause: CLI argument parser strips/loses multiline content; no stdin pipe support
  Impact: Real diffs are always multiline — this command is unusable for its primary purpose. Should support cat diff.txt |
  dojops analyze diff or dojops analyze diff --file diff.txt

  BUG-3: apply Dockerfile Task Fails Zod Schema Validation

  Severity: HIGH (blocks plan execution)
  Reproduce: dojops apply --yes with a plan containing a dockerfile task
  Root Cause: LLM generates Dockerfile content that doesn't match the DockerfileSchema Zod structure (missing stages[].from,
  stages[].commands). The schema is too rigid for LLM output variability
  Impact: First task fails → all dependent tasks cascade-skip → plan completely fails

  BUG-4: ShellCheck Scanner Always Shows "Failed to parse output"

  Severity: MEDIUM (scan degradation)
  Reproduce: dojops scan --iac on any project with shell scripts
  Root Cause: The shellcheck npm package wrapper intercepts the binary name and fails with permission errors. The scanner catches
   the error but reports it as a parse failure instead of a meaningful message
  Impact: Shell script security issues go unreported

  BUG-5: generate Output Includes Preflight JSON When --output json

  Severity: LOW (output pollution)
  Reproduce: dojops "Create CI" --output json — output contains both preflight result JSON AND the generation result JSON
  Impact: Piping JSON output to jq fails because of multiple JSON documents

  ---
  MISSING FEATURES (10)

  MF-1: analyze diff --file <path> / stdin support

  The diff analysis command should accept a file path or stdin, since diffs are always multiline. terraform plan | dojops analyze
   diff would be the ideal UX.

  MF-2: plan --execute with --output json should output structured execution results

  Currently mixes spinner output with JSON. For CI/CD integration, clean JSON output is essential.

  MF-3: No --agent flag to force agent routing

  Users should be able to bypass keyword routing: dojops --agent terraform-specialist "create an S3 module". Currently relies
  entirely on keyword matching.

  MF-4: No .dojops/context.json usage in generate/plan prompts

  The init command scans the repo and saves context, but the generate and plan commands don't seem to inject this context into
  LLM prompts. The LLM generates generic configs instead of project-specific ones.

  MF-5: No apply --task <task-id> to run a single task

  When one task fails in a plan (like the Dockerfile), there's no way to re-run just that task. Only --resume which skips
  completed tasks.

  MF-6: No scan --fix auto-remediation

  The scan results show recommendations but there's no way to auto-apply safe fixes (like npm audit fix).

  MF-7: No check command for Terraform files

  dojops check Dockerfile works, dojops check scripts/ works, but there's no explicit Terraform/K8s config quality check using
  the existing verifiers.

  MF-8: No export command for generated configs

  After dojops generate, the output is shown on screen but not saved to a file. Need --write flag or dojops export to save the
  last generation to disk.

  MF-9: No plugin create wizard

  dojops tools plugins init should scaffold a new plugin directory with plugin.yaml template and input.schema.json.

  MF-10: No --watch mode for scan

  For DevSecOps workflows, dojops scan --security --watch that re-scans on file changes would be valuable.

  ---
  UX ASSESSMENT

  What works well

  - Agent routing is accurate — "Create CI/CD pipeline" routes to cicd-specialist, "Generate Dockerfile" to docker-specialist
  - init scan correctly detects the project stack (Next.js + Terraform + Docker + shell)
  - status/doctor gives a comprehensive health check with all tools
  - check is genuinely useful — found real security issues (typo GITHIB_TOKEN, sed injection, terraform state exposure)
  - scan --security found real CVEs and gitleaks secrets — high value for a DevSecOps workflow
  - debug ci provides actionable, high-confidence diagnoses
  - explain produces thorough, security-aware explanations
  - apply --dry-run with drift warnings is a great safety feature
  - History + audit chain verification provides accountability
  - Error messages are mostly clear with usage hints

  What needs improvement

  - Double output bug makes the tool look broken on every error path
  - analyze diff is the most natural command for a DevSecOps engineer (reviewing terraform plan output) but is unusable with real
   diffs
  - Plan execution is fragile — Zod schema strictness means LLM output variability kills task execution
  - No project context in prompts — the tool generates generic configs despite having scanned the repo
  - Missing --write/export — generating configs is only useful if you can save them
  - ShellCheck parser silently fails, reducing scan value

  Overall Verdict

  7/10 — The core intelligence is excellent (LLM output quality, agent routing, security scanning), but the execution pipeline
  has critical bugs that prevent real end-to-end usage. Fix BUG-2, BUG-3, and add MF-1 + MF-8 to make this a genuinely
  time-saving DevSecOps tool.

● ---
  Priority fix order for v1.0.0:
  1. BUG-1 (double output) — easiest win, makes CLI look professional
  2. BUG-3 (Dockerfile schema) — blocks plan execution entirely
  3. BUG-2 (multiline diff) — blocks the analyze diff use case
  4. BUG-4 (ShellCheck parser) — degrades scan quality
  5. MF-8 (--write flag) — without this, generation is view-only
  6. MF-1 (stdin/file for diff) — natural DevSecOps workflow