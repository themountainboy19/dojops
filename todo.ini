 Step 3: Expand infra detection (detectInfra in scanner.ts)

 Add after existing Ansible detection:
 - Kustomize: kustomization.yaml, kustomization.yml
 - Vagrant: Vagrantfile
 - Pulumi: Pulumi.yaml, Pulumi.yml
 - CloudFormation: cloudformation/ dir, *.cfn.yml/*.cfn.yaml, or template.yaml with AWSTemplateFormatVersion content
 verification (same pattern as K8s weak-dir detection)

 Step 4: Expand monitoring detection (detectMonitoring in scanner.ts)

 Add: HAProxy (haproxy.cfg), Tomcat (server.xml), Apache (httpd.conf, apache2.conf, .htaccess), Caddy (Caddyfile), Envoy
 (envoy.yaml, envoy.yml)

 Step 5: New detectScripts() and detectSecurity() functions (scanner.ts)

 detectScripts(root): Scan root + scripts/ for .sh and .py files. Check Justfile.

 detectSecurity(root): Check .env.example, .gitignore, CODEOWNERS (root + .github/), SECURITY.md (root + .github/),
 .github/dependabot.yml, renovate.json, .github/secret_scanning.yml, .editorconfig.

 Step 6: Add collectDevopsFiles() and update scanRepo() (scanner.ts)

 collectDevopsFiles(): Aggregate all detected DevOps file paths into a flat deduplicated string[] — CI configs, Dockerfiles,
 compose, .tf files, monitoring configs, scripts, security files.

 Update scanRepo(): Call new detectors, return version 2 context with scripts, security, devopsFiles.

 Step 7: Update deriveRelevantDomains() (scanner.ts)

 Make scripts and security params optional (backward-compatible). Map new detections:
 - Kustomize → container-orchestration
 - Pulumi/CloudFormation → infrastructure, cloud-architecture
 - HAProxy/Apache/Caddy/Envoy → networking
 - Shell scripts → shell-scripting, Python scripts → python-scripting

 Step 8: Version migration in loadContext() (packages/cli/src/state.ts)

 Check data.version: if 2 → parse V2, if 1 → parse V1 then migrate (add defaults for new fields).

 Step 9: Create DevOpsChecker (packages/core/src/agents/devops-checker.ts)

 Following CIDebugger/InfraDiffAnalyzer pattern:
 - CheckReportSchema: { summary, score (0-100), findings[], missingFiles[] }
 - CheckFindingSchema: { file, category, severity, message, recommendation }
 - System prompt: senior DevOps engineer reviewing for security, quality, best practices, missing files
 - check(contextJson, fileContents[]) method → LLM call with schema
 - Export from packages/core/src/agents/index.ts

 Step 10: Create oda check command (packages/cli/src/commands/check.ts)

 1. Load context (exit if missing → "run oda init first")
 2. Read up to 20 devopsFiles (max 50KB each)
 3. Send to DevOpsChecker
 4. Display: maturity score, findings by severity (color-coded), missing files
 5. Support --output json
 6. Audit log

 Register in packages/cli/src/index.ts (registerCommand), add "check" to KNOWN_COMMANDS in parser.ts, add help in help.ts.

 Step 11: Update init display (packages/cli/src/commands/init.ts)

 Extend formatScanSummary(): show new infra/monitoring items, scripts count, security files, devopsFiles total.

