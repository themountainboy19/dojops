<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ODA Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <h1><span>ODA</span> Dashboard</h1>
      <span id="provider-badge" class="badge">loading...</span>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="generate">Generate</button>
      <button class="tab" data-tab="plan">Plan</button>
      <button class="tab" data-tab="debug-ci">Debug CI</button>
      <button class="tab" data-tab="diff">Infra Diff</button>
      <button class="tab" data-tab="agents">Agents</button>
      <button class="tab" data-tab="history">History</button>
    </nav>

    <div class="content">
      <!-- Generate -->
      <div id="panel-generate" class="panel active">
        <div class="card">
          <h3>Agent-Routed Generation</h3>
          <div class="form-group">
            <label for="gen-prompt">Prompt</label>
            <textarea
              id="gen-prompt"
              placeholder="e.g. Create a Terraform config for an S3 bucket with versioning..."
            ></textarea>
          </div>
          <div class="form-group">
            <label for="gen-temp">Temperature: <span id="gen-temp-val">0.7</span></label>
            <input type="range" id="gen-temp" min="0" max="2" step="0.1" value="0.7" />
          </div>
          <button class="btn btn--primary" id="gen-submit">Generate</button>
        </div>
        <div id="gen-spinner" class="spinner">Processing...</div>
        <div id="gen-result" class="result"></div>
      </div>

      <!-- Plan -->
      <div id="panel-plan" class="panel">
        <div class="card">
          <h3>Task Decomposition</h3>
          <div class="form-group">
            <label for="plan-goal">Goal</label>
            <textarea
              id="plan-goal"
              placeholder="e.g. Set up CI/CD pipeline for a Node.js app with Docker deployment..."
            ></textarea>
          </div>
          <div class="checkbox-group">
            <label>
              <input type="checkbox" id="plan-execute" />
              Execute tasks
            </label>
            <label>
              <input type="checkbox" id="plan-approve" />
              Auto-approve
            </label>
          </div>
          <br />
          <button class="btn btn--primary" id="plan-submit">Decompose</button>
        </div>
        <div id="plan-spinner" class="spinner">Decomposing...</div>
        <div id="plan-result" class="result"></div>
      </div>

      <!-- Debug CI -->
      <div id="panel-debug-ci" class="panel">
        <div class="card">
          <h3>CI Log Diagnosis</h3>
          <div class="form-group">
            <label for="ci-log">CI Log Output</label>
            <textarea
              id="ci-log"
              placeholder="Paste your CI/CD log output here..."
              style="min-height: 200px"
            ></textarea>
          </div>
          <button class="btn btn--primary" id="ci-submit">Diagnose</button>
        </div>
        <div id="ci-spinner" class="spinner">Analyzing...</div>
        <div id="ci-result" class="result"></div>
      </div>

      <!-- Infra Diff -->
      <div id="panel-diff" class="panel">
        <div class="card">
          <h3>Infrastructure Diff Analysis</h3>
          <div class="form-group">
            <label for="diff-content">Diff / Plan Output</label>
            <textarea
              id="diff-content"
              placeholder="Paste terraform plan output, k8s manifest diff, etc..."
              style="min-height: 200px"
            ></textarea>
          </div>
          <details style="margin-bottom: 16px">
            <summary style="cursor: pointer; color: var(--text-muted); font-size: 13px">
              Compare mode (before/after)
            </summary>
            <div class="form-group" style="margin-top: 12px">
              <label for="diff-before">Before</label>
              <textarea
                id="diff-before"
                placeholder="Previous configuration..."
                style="min-height: 100px"
              ></textarea>
            </div>
            <div class="form-group">
              <label for="diff-after">After</label>
              <textarea
                id="diff-after"
                placeholder="New configuration..."
                style="min-height: 100px"
              ></textarea>
            </div>
          </details>
          <button class="btn btn--primary" id="diff-submit">Analyze</button>
        </div>
        <div id="diff-spinner" class="spinner">Analyzing...</div>
        <div id="diff-result" class="result"></div>
      </div>

      <!-- Agents -->
      <div id="panel-agents" class="panel">
        <div class="card">
          <h3>Specialist Agents</h3>
          <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 16px">
            Available agents for prompt routing.
          </p>
        </div>
        <div id="agents-grid" class="agent-grid"></div>
      </div>

      <!-- History -->
      <div id="panel-history" class="panel">
        <div class="history-controls">
          <select id="history-type">
            <option value="">All types</option>
            <option value="generate">Generate</option>
            <option value="plan">Plan</option>
            <option value="debug-ci">Debug CI</option>
            <option value="diff">Diff</option>
          </select>
          <button class="btn btn--danger" id="history-clear">Clear</button>
        </div>
        <div id="history-table"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
