<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <style>
      .pixel { shape-rendering: crispEdges; }
      .neon { fill: #00d4ff; }
      .dark { fill: #0a0a1a; }
      .mid { fill: #1a1a3e; }
      .light { fill: #2a2a5e; }
      .grid { fill: none; stroke: #00d4ff; stroke-width: 0.5; opacity: 0.3; }
      .glow { filter: url(#neonGlow); }
    </style>
    <!-- Multi-layer neon glow filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle radial gradient for background depth -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#12122e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
  </defs>

  <!-- Background circle (Enso style) with gradient -->
  <circle cx="60" cy="60" r="55" fill="url(#bgGrad)" stroke="#0f0f2f" stroke-width="2"/>
  <!-- Subtle outer ring glow -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>

  <!-- Circuit grid pattern on helmet -->
  <g class="grid">
    <line x1="40" y1="30" x2="80" y2="30"/>
    <line x1="40" y1="40" x2="80" y2="40"/>
    <line x1="45" y1="25" x2="45" y2="50"/>
    <line x1="60" y1="25" x2="60" y2="50"/>
    <line x1="75" y1="25" x2="75" y2="50"/>
    <circle cx="45" cy="35" r="1.5" fill="#00d4ff" stroke="none"/>
    <circle cx="60" cy="40" r="1.5" fill="#00d4ff" stroke="none"/>
    <circle cx="75" cy="30" r="1.5" fill="#00d4ff" stroke="none"/>
  </g>

  <!-- Helmet base (Kabuto style) -->
  <path d="M35 45 L35 35 Q35 20 60 18 Q85 20 85 35 L85 45 L80 50 L40 50 Z" class="mid"/>
  <path d="M35 45 L40 50 L80 50 L85 45" fill="none" stroke="#00d4ff" stroke-width="1.5"/>

  <!-- Helmet crest (pixelated, Maedate) -->
  <g class="pixel neon glow">
    <rect x="58" y="7" width="4" height="3"/>
    <rect x="55" y="10" width="10" height="4"/>
    <rect x="52" y="14" width="16" height="4"/>
  </g>

  <!-- Face mask (Men style) - pixelated -->
  <g class="pixel">
    <!-- Mask base -->
    <rect x="38" y="48" width="44" height="32" class="mid"/>
    <rect x="36" y="50" width="4" height="28" class="light"/>
    <rect x="80" y="50" width="4" height="28" class="light"/>

    <!-- Grill lines -->
    <rect x="42" y="52" width="36" height="2" class="dark"/>
    <rect x="42" y="62" width="36" height="2" class="dark"/>
    <rect x="42" y="68" width="36" height="2" class="dark"/>
    <rect x="42" y="74" width="36" height="2" class="dark"/>

    <!-- Vertical grill -->
    <rect x="50" y="62" width="2" height="14" class="dark"/>
    <rect x="68" y="62" width="2" height="14" class="dark"/>
  </g>

  <!-- Glowing eyes (positioned between grills) -->
  <g class="glow">
    <rect x="43" y="55" width="8" height="5" class="neon pixel"/>
    <rect x="69" y="55" width="8" height="5" class="neon pixel"/>
  </g>

  <!-- Left-side circuit pattern (mirrors right) -->
  <g class="neon" opacity="0.8">
    <circle cx="38" cy="55" r="3" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <line x1="38" y1="52" x2="38" y2="45" stroke="#00d4ff" stroke-width="1"/>
    <line x1="35" y1="55" x2="30" y2="55" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="38" cy="45" r="1.5" class="neon"/>
    <circle cx="30" cy="55" r="1.5" class="neon"/>
    <line x1="38" y1="58" x2="38" y2="65" stroke="#00d4ff" stroke-width="0.8"/>
    <circle cx="38" cy="67" r="1" class="neon"/>
  </g>

  <!-- Right-side circuit pattern -->
  <g class="neon" opacity="0.8">
    <circle cx="82" cy="55" r="3" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <line x1="82" y1="52" x2="82" y2="45" stroke="#00d4ff" stroke-width="1"/>
    <line x1="85" y1="55" x2="90" y2="55" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="82" cy="45" r="1.5" class="neon"/>
    <circle cx="90" cy="55" r="1.5" class="neon"/>
    <line x1="82" y1="58" x2="82" y2="65" stroke="#00d4ff" stroke-width="0.8"/>
    <circle cx="82" cy="67" r="1" class="neon"/>
  </g>

  <!-- Neck guard (Shikoro) - pixelated -->
  <g class="pixel">
    <rect x="32" y="78" width="56" height="6" class="light"/>
    <rect x="30" y="84" width="60" height="6" class="mid"/>
    <rect x="28" y="90" width="64" height="6" class="light"/>
  </g>

  <!-- Neon trim accents -->
  <g fill="none" stroke="#00d4ff" stroke-width="1">
    <path d="M38 48 L38 78"/>
    <path d="M82 48 L82 78"/>
    <path d="M35 78 L85 78"/>
  </g>

  <!-- Torii gate at bottom -->
  <g class="pixel neon glow" transform="translate(49, 97)">
    <rect x="2" y="2" width="3" height="10"/>
    <rect x="17" y="2" width="3" height="10"/>
    <rect x="0" y="0" width="22" height="3"/>
    <rect x="1" y="6" width="20" height="2"/>
  </g>

  <!-- Terminal cursor blink -->
  <g class="neon glow">
    <rect x="95" y="105" width="8" height="3" class="neon pixel">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
